<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-Aware Order Delivery System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .process-btn {
            padding: 12px 25px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .process-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .process-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content {
            padding: 30px;
        }

        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .order-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge-delayed {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-ontime {
            background: #d4edda;
            color: #155724;
        }

        .badge-error {
            background: #e2e3e5;
            color: #383d41;
        }

        .order-info {
            margin-top: 12px;
        }

        .info-row {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
            margin-left: 5px;
        }

        .apology-message {
            margin-top: 15px;
            padding: 12px;
            background: #ffe6e6;
            border-left: 4px solid #dc3545;
            border-radius: 4px;
            font-size: 13px;
            color: #721c24;
            font-style: italic;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🌦️ Weather-Aware Delivery System</h1>
                <p>Real-time weather checks for accurate delivery status</p>
            </div>
            <button class="process-btn" id="checkBtn">Check Weather Delays</button>
        </div>

        <div class="content">
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>
            <div class="order-grid" id="ordersContainer"></div>
        </div>
    </div>

    <script>
        const ordersContainer = document.getElementById('ordersContainer');
        const checkBtn = document.getElementById('checkBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Initial order data displayed when the page loads
        const initialOrders = [
            { "order_id": "1001", "customer": "Alice Smith", "city": "New York", "status": "Pending" },
            { "order_id": "1002", "customer": "Bob Jones", "city": "Mumbai", "status": "Pending" },
            { "order_id": "1003", "customer": "Charlie Green", "city": "London", "status": "Pending" },
            { "order_id": "1004", "customer": "InvalidCity123", "city": "InvalidCity123", "status": "Pending" }
        ];

        // Render orders on the page
        function displayOrders(orders) {
            ordersContainer.innerHTML = '';
            
            orders.forEach(function(order) {
                let badgeClass = 'badge-pending';
                
                if (order.status === 'Delayed') badgeClass = 'badge-delayed';
                else if (order.status === 'On Time') badgeClass = 'badge-ontime';
                else if (order.status === 'Error (City Unknown)') badgeClass = 'badge-error';

                let card = '<div class="order-card">';
                card += '<span class="status-badge ' + badgeClass + '">' + order.status + '</span>';
                card += '<div class="order-info">';
                card += '<div class="info-row"><span class="info-label">Order ID:</span><span class="info-value">#' + order.order_id + '</span></div>';
                card += '<div class="info-row"><span class="info-label">Customer:</span><span class="info-value">' + order.customer + '</span></div>';
                card += '<div class="info-row"><span class="info-label">Destination:</span><span class="info-value">' + order.city + '</span></div>';
                
                if (order.apology) {
                    card += '<div class="apology-message">📍 ' + order.apology + '</div>';
                }
                
                card += '</div></div>';
                ordersContainer.innerHTML += card;
            });
        }

        // Display initial orders when page loads
        displayOrders(initialOrders);

        // Handle button click to check weather delays
        checkBtn.addEventListener('click', async function() {
            checkBtn.innerText = '';
            checkBtn.innerHTML = '<span class="loading-spinner"></span>Checking weather...';
            checkBtn.disabled = true;
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                const response = await fetch('/api/process', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    displayOrders(data.updatedOrders);
                    successMsg.innerText = '✓ Orders processed successfully!';
                    successMsg.style.display = 'block';
                } else {
                    throw new Error(data.message || 'Failed to process orders');
                }
            } catch (error) {
                errorMsg.innerText = '✗ Error: ' + error.message;
                errorMsg.style.display = 'block';
            } finally {
                checkBtn.innerText = 'Check Weather Delays';
                checkBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
